name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: OSS grep gate
        run: |
          set -euo pipefail
          if rg -i 'clerk|polar|posthog|ClerkAuthGuard|BILLING_ENABLED|isLocalAuth|Henüz lisanslanmadı|misafir bileti' apps docs deploy --glob '!**/.github/**'; then
            echo "OSS grep gate failed — SaaS remnants found"
            exit 1
          fi
          if rg '[ğüşıöçĞÜŞİÖÇ]' apps/server/src apps/server/test apps/server/deploy apps/server/README.md apps/server/scripts --glob '!**/.tr-en-cache.json'; then
            echo "Turkish characters found under apps/server"
            exit 1
          fi

      - name: Build server
        working-directory: apps/server
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test
          LLM_GENERATION_PROVIDER: openai
          LLM_CHAT_PROVIDER: openai
          OPENAI_API_KEY: test
        run: pnpm build

      - name: Build web
        run: pnpm build:web

      - name: Server unit tests
        working-directory: apps/server
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test
          LLM_GENERATION_PROVIDER: openai
          LLM_CHAT_PROVIDER: openai
          OPENAI_API_KEY: test
        run: pnpm test:unit

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Server e2e tests
        working-directory: apps/server
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test
          LLM_GENERATION_PROVIDER: openai
          LLM_CHAT_PROVIDER: openai
          OPENAI_API_KEY: test
          PORT: 4444
          CORS_ORIGIN: http://localhost:3000
          NODE_ENV: test
        run: pnpm test:e2e
