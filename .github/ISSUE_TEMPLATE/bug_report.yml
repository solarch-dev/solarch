name: Bug report
description: Something is broken or behaves unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Please include enough detail to reproduce.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, plus what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - web (canvas / UI)
        - server (API / Neo4j)
        - codegen / AI
        - self-host (docker)
        - other
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Hosted app or self-host? Browser, OS, Node version, commit if known.
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Console output, server logs, or a screen recording help a lot.
