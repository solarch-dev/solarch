# Solarch HTTPS — certbot --apache ile üretilir/günceller. Elle kopyalarsan sertifika yollarını doğrula.
# certbot sonrası X-Forwarded-Proto https olmalı (aşağıdaki gibi).

<IfModule mod_ssl.c>
<VirtualHost *:443>
	ServerName app.solarch.dev
	ServerAdmin webmaster@localhost

	DocumentRoot /var/www/solarch/dist
	<Directory /var/www/solarch/dist>
		Options -Indexes +FollowSymLinks
		AllowOverride None
		Require all granted
		FallbackResource /index.html
	</Directory>

	ProxyPreserveHost On
	ProxyPass /api http://127.0.0.1:4001/api
	ProxyPassReverse /api http://127.0.0.1:4001/api

	RequestHeader set X-Forwarded-Proto "https"
	RequestHeader set X-Forwarded-Port "443"

	Header always set Referrer-Policy "strict-origin-when-cross-origin"
	Header always set X-Content-Type-Options "nosniff"
	Header always set X-Frame-Options "DENY"

	<LocationMatch "^/assets/">
		Header set Cache-Control "public, max-age=31536000, immutable"
	</LocationMatch>
	<Files "index.html">
		Header set Cache-Control "no-cache"
	</Files>

	ErrorLog ${APACHE_LOG_DIR}/app.solarch.dev-error.log
	CustomLog ${APACHE_LOG_DIR}/app.solarch.dev-access.log combined

	SSLCertificateFile /etc/letsencrypt/live/app.solarch.dev/fullchain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/app.solarch.dev/privkey.pem
	Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
</IfModule>
