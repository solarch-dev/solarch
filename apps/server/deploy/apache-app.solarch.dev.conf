# Solarch — app.solarch.dev (Apache). AKD (antakyaamerikankultur.com) ayrı default vhost'ta kalır.
# Kurulum:
#   sudo cp deploy/apache-app.solarch.dev.conf /etc/apache2/sites-available/app.solarch.dev.conf
#   sudo a2ensite app.solarch.dev.conf
#   sudo mkdir -p /var/www/solarch/dist
#   sudo cp deploy/placeholder-index.html /var/www/solarch/dist/index.html   # build öncesi
#   sudo apache2ctl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d app.solarch.dev
#
# Backend loopback :4001 (AKD :4000'ü kullanır). .env: PORT=4001

<VirtualHost *:80>
	ServerName app.solarch.dev
	ServerAdmin webmaster@localhost

	DocumentRoot /var/www/solarch/dist
	<Directory /var/www/solarch/dist>
		Options -Indexes +FollowSymLinks
		AllowOverride None
		Require all granted
		FallbackResource /index.html
	</Directory>

	# /api/* → Solarch NestJS (global prefix api/v1 → /api/v1/...)
	ProxyPreserveHost On
	ProxyPass /api http://127.0.0.1:4001/api
	ProxyPassReverse /api http://127.0.0.1:4001/api

	RequestHeader set X-Forwarded-Proto "http"
	RequestHeader set X-Forwarded-Port "80"

	Header always set Referrer-Policy "strict-origin-when-cross-origin"
	Header always set X-Content-Type-Options "nosniff"
	Header always set X-Frame-Options "DENY"

	<LocationMatch "^/assets/">
		Header set Cache-Control "public, max-age=31536000, immutable"
	</LocationMatch>
	<Files "index.html">
		Header set Cache-Control "no-cache"
	</Files>

	ErrorLog ${APACHE_LOG_DIR}/app.solarch.dev-error.log
	CustomLog ${APACHE_LOG_DIR}/app.solarch.dev-access.log combined

	# certbot --apache HTTPS kurduktan sonra HTTP→HTTPS yönlendirmesi ekler.
	# Manuel ekleme (certbot öncesi):
	# RewriteEngine on
	# RewriteCond %{SERVER_NAME} =app.solarch.dev
	# RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>
